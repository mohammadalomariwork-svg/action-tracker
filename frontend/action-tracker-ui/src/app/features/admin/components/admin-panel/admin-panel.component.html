<div class="ap-page">

  <!-- ── Breadcrumb ──────────────────────────────────────────────────────────── -->
  <app-admin-breadcrumb [items]="[{ label: 'Admin Panel' }]" class="mb-3 d-block" />

  <!-- ── Page header ────────────────────────────────────────────────────────── -->
  <app-page-header
    title="Admin Panel"
    subtitle="System Administration"
    icon="bi bi-shield-lock-fill"
  />

  <!-- ── Feature cards grid ─────────────────────────────────────────────────── -->
  <div class="row g-4">
    @for (card of features; track card.id) {
      <div class="col-xl-3 col-lg-6 col-md-6 col-sm-12">
        <div
          class="card admin-card h-100"
          [style.border-top]="'4px solid var(--bs-' + card.color + ')'"
          (click)="navigate(card.route)"
        >

          <!-- Card header: icon + optional badge -->
          <div class="card-header bg-transparent border-0 pt-4 pb-2 text-center position-relative">
            <i
              class="bi {{ card.icon }} ap-card-icon"
              [ngClass]="'text-' + card.color"
            ></i>
            @if (card.badge) {
              <span class="badge ap-badge" [ngClass]="'bg-' + card.color">
                {{ card.badge }}
              </span>
            }
          </div>

          <!-- Card body: title + description -->
          <div class="card-body pt-2 text-center">
            <h5 class="card-title fw-bold mb-2">{{ card.title }}</h5>
            <p class="card-text text-muted small mb-0">{{ card.description }}</p>
          </div>

          <!-- Card footer: Manage button -->
          <div class="card-footer bg-transparent border-0 pb-4 text-center">
            <button
              class="btn btn-sm"
              [ngClass]="'btn-outline-' + card.color"
              (click)="navigate(card.route); $event.stopPropagation()"
            >
              Manage &rarr;
            </button>
          </div>

        </div>
      </div>
    }
  </div>

</div>
