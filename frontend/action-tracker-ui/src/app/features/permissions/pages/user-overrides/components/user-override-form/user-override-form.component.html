<div #modalEl class="modal fade" tabindex="-1" role="dialog" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content uof-card">

      <!-- ── Header ──────────────────────────────────────────────────────── -->
      <div class="modal-header uof-header">
        <h5 class="modal-title fw-semibold">
          <i class="bi bi-shield-plus me-2"></i>{{ modalTitle }}
        </h5>
        <button type="button" class="btn-close" (click)="close()" aria-label="Close"></button>
      </div>

      <!-- ── Error ───────────────────────────────────────────────────────── -->
      @if (error()) {
        <div class="alert alert-danger d-flex align-items-center gap-2 mx-3 mt-3 mb-0" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- ── Body ────────────────────────────────────────────────────────── -->
      <div class="modal-body p-4">
        <form [formGroup]="form" (ngSubmit)="submit()" novalidate id="overrideForm">

          <div class="row g-3">

            <!-- Area -->
            <div class="col-md-6">
              <label class="form-label fw-medium">Area <span class="text-danger">*</span></label>
              @if (mode() === 'edit') {
                <p class="form-control-plaintext fw-semibold text-primary">
                  {{ getLabelForArea(form.getRawValue().area) }}
                </p>
              } @else {
                <select class="form-select" formControlName="area"
                  [class.is-invalid]="form.controls.area.invalid && form.controls.area.touched">
                  @for (opt of areaEntries; track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                  }
                </select>
              }
            </div>

            <!-- Action -->
            <div class="col-md-6">
              <label class="form-label fw-medium">Action <span class="text-danger">*</span></label>
              @if (mode() === 'edit') {
                <p class="form-control-plaintext fw-semibold text-primary">
                  {{ getLabelForAction(form.getRawValue().action) }}
                </p>
              } @else {
                <select class="form-select" formControlName="action"
                  [class.is-invalid]="form.controls.action.invalid && form.controls.action.touched">
                  @for (opt of actionEntries; track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                  }
                </select>
              }
            </div>

            <!-- Type (Granted / Revoked) -->
            <div class="col-md-6">
              <label class="form-label fw-medium">Type <span class="text-danger">*</span></label>
              <div class="d-flex gap-3 pt-1">
                <div class="form-check">
                  <input class="form-check-input" type="radio" id="typeGranted"
                    formControlName="isGranted" [value]="true" />
                  <label class="form-check-label text-success fw-medium" for="typeGranted">
                    <i class="bi bi-check-circle me-1"></i>Granted
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" id="typeRevoked"
                    formControlName="isGranted" [value]="false" />
                  <label class="form-check-label text-danger fw-medium" for="typeRevoked">
                    <i class="bi bi-x-circle me-1"></i>Revoked
                  </label>
                </div>
              </div>
            </div>

            <!-- Scope -->
            <div class="col-md-6">
              <label class="form-label fw-medium">Scope</label>
              <select class="form-select" formControlName="orgUnitScope">
                @for (opt of scopeEntries; track opt.value) {
                  <option [value]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </div>

            <!-- Org Unit (shown only when SpecificOrgUnit) -->
            @if (isSpecificOrgUnit) {
              <div class="col-md-6">
                <label class="form-label fw-medium">Org Unit ID</label>
                <input type="text" class="form-control" formControlName="orgUnitId"
                  placeholder="e.g. 3fa85f64-5717-…" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-medium">Org Unit Name</label>
                <input type="text" class="form-control" formControlName="orgUnitName"
                  placeholder="e.g. IT Department" />
              </div>
            }

            <!-- Reason -->
            <div class="col-12">
              <label class="form-label fw-medium">Reason <span class="text-muted">(optional)</span></label>
              <textarea class="form-control" formControlName="reason" rows="2"
                placeholder="Briefly explain why this override is needed…"></textarea>
            </div>

            <!-- Expires At -->
            <div class="col-md-6">
              <label class="form-label fw-medium">Expires At <span class="text-muted">(optional)</span></label>
              <input type="datetime-local" class="form-control" formControlName="expiresAt" />
            </div>

            <!-- Is Active (edit mode only) -->
            @if (mode() === 'edit') {
              <div class="col-md-6 d-flex align-items-end pb-1">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="isActiveSwitch"
                    formControlName="isActive" />
                  <label class="form-check-label fw-medium" for="isActiveSwitch">Active</label>
                </div>
              </div>
            }

          </div>
        </form>
      </div>

      <!-- ── Footer ──────────────────────────────────────────────────────── -->
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-outline-secondary" (click)="close()"
          [disabled]="saving()">Cancel</button>
        <button type="submit" form="overrideForm" class="btn btn-primary d-inline-flex align-items-center gap-2"
          [disabled]="saving()">
          @if (saving()) {
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            Saving…
          } @else {
            <i class="bi bi-floppy me-1"></i>
            {{ mode() === 'create' ? 'Add Override' : 'Save Changes' }}
          }
        </button>
      </div>

    </div>
  </div>
</div>
