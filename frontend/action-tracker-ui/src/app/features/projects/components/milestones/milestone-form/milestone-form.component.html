<div class="mf-container">

  @if (errorMessage) {
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ errorMessage }}</span>
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="row g-3">

      <!-- Title -->
      <div class="col-md-8">
        <label for="mfTitle" class="form-label">Title <span class="text-danger">*</span></label>
        <input
          id="mfTitle"
          type="text"
          class="form-control form-control-sm"
          formControlName="title"
          placeholder="Milestone title"
          [class.is-invalid]="isInvalid('title')"
        />
        @if (hasError('title', 'required')) {
          <div class="invalid-feedback">Title is required.</div>
        }
      </div>

      <!-- Sequence Order -->
      <div class="col-md-4">
        <label for="mfSeq" class="form-label">Sequence #</label>
        <input
          id="mfSeq"
          type="number"
          class="form-control form-control-sm"
          formControlName="sequenceOrder"
          min="1"
        />
      </div>

      <!-- Description -->
      <div class="col-12">
        <label for="mfDesc" class="form-label">Description</label>
        <textarea
          id="mfDesc"
          class="form-control form-control-sm"
          formControlName="description"
          rows="2"
          placeholder="Optional description"
        ></textarea>
      </div>

      <!-- Planned Start -->
      <div class="col-md-6">
        <label for="mfStart" class="form-label">
          Planned Start <span class="text-danger">*</span>
          @if (isBaselined) {
            <i class="bi bi-lock-fill text-muted ms-1" title="Baselined"></i>
          }
        </label>
        <input
          id="mfStart"
          type="date"
          class="form-control form-control-sm"
          formControlName="plannedStartDate"
          [class.is-invalid]="isInvalid('plannedStartDate')"
        />
        @if (hasError('plannedStartDate', 'required')) {
          <div class="invalid-feedback">Start date is required.</div>
        }
      </div>

      <!-- Planned End -->
      <div class="col-md-6">
        <label for="mfEnd" class="form-label">
          Planned End <span class="text-danger">*</span>
          @if (isBaselined) {
            <i class="bi bi-lock-fill text-muted ms-1" title="Baselined"></i>
          }
        </label>
        <input
          id="mfEnd"
          type="date"
          class="form-control form-control-sm"
          formControlName="plannedEndDate"
          [class.is-invalid]="isInvalid('plannedEndDate')"
        />
        @if (hasError('plannedEndDate', 'required')) {
          <div class="invalid-feedback">End date is required.</div>
        }
      </div>

      <!-- Status (edit mode only) -->
      @if (isEditMode) {
        <div class="col-md-6">
          <label for="mfStatus" class="form-label">Status</label>
          <select
            id="mfStatus"
            class="form-select form-select-sm"
            formControlName="status"
          >
            <option [ngValue]="MilestoneStatus.NotStarted">Not Started</option>
            <option [ngValue]="MilestoneStatus.InProgress">In Progress</option>
            <option [ngValue]="MilestoneStatus.Completed">Completed</option>
            <option [ngValue]="MilestoneStatus.Delayed">Delayed</option>
            <option [ngValue]="MilestoneStatus.Cancelled">Cancelled</option>
          </select>
        </div>

        <!-- Completion % (edit mode only) -->
        <div class="col-md-6">
          <label for="mfCompletion" class="form-label">Completion %</label>
          <input
            id="mfCompletion"
            type="number"
            class="form-control form-control-sm"
            formControlName="completionPercentage"
            min="0"
            max="100"
          />
        </div>

        <!-- Actual Start -->
        <div class="col-md-6">
          <label for="mfActualStart" class="form-label">Actual Start</label>
          <input
            id="mfActualStart"
            type="date"
            class="form-control form-control-sm"
            formControlName="actualStartDate"
          />
        </div>

        <!-- Actual End -->
        <div class="col-md-6">
          <label for="mfActualEnd" class="form-label">Actual End</label>
          <input
            id="mfActualEnd"
            type="date"
            class="form-control form-control-sm"
            formControlName="actualEndDate"
          />
        </div>
      }

    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onCancel()" [disabled]="isSubmitting">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" [disabled]="isSubmitting">
        @if (isSubmitting) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Saving…
        } @else if (isEditMode) {
          <i class="bi bi-check-lg"></i>Save Changes
        } @else {
          <i class="bi bi-plus-circle"></i>Create
        }
      </button>
    </div>
  </form>

</div>
