<div class="kpi-card" [class]="'kpi-card--' + colorClass()">
  <div class="kpi-card__top-border"></div>

  <div class="kpi-card__body">
    <div class="kpi-card__header">
      <span class="kpi-card__title">{{ title() }}</span>
      @if (icon()) {
        <span class="kpi-card__icon">{{ icon() }}</span>
      }
    </div>

    <div class="kpi-card__value">{{ value() }}</div>

    <div class="kpi-card__footer">
      @if (subtitle()) {
        <span class="kpi-card__subtitle">{{ subtitle() }}</span>
      }

      @if (hasTrend()) {
        <span class="kpi-card__trend" [class.kpi-card__trend--up]="trendPositive()" [class.kpi-card__trend--down]="!trendPositive()">
          {{ trendPositive() ? '▲' : '▼' }} {{ trendAbs() }}%
        </span>
      }
    </div>
  </div>
</div>
