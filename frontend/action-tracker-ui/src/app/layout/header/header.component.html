<header class="header">
  <div class="header-inner">

    <!-- Logo + Brand -->
    <a class="brand" routerLink="/dashboard">
      <span class="brand-icon">&#9881;</span>
      <span class="brand-name">Action Tracker</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-links" [class.open]="menuOpen()">
      @for (link of visibleLinks(); track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '/dashboard' }"
          (click)="closeMenu()"
          class="nav-link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Right side -->
    <div class="header-right">
      <!-- Connection status -->
      <span class="status-dot" title="Connected"></span>

      <!-- User dropdown -->
      @if (currentUser$ | async; as user) {
        <div class="nav-user" (click)="$event.stopPropagation()">
          <button class="avatar-btn" (click)="toggleMenu()" aria-label="User menu">
            <span class="avatar">{{ user.fullName.charAt(0).toUpperCase() }}</span>
            <span class="user-name">{{ user.fullName }}</span>
            <span class="chevron" [class.up]="menuOpen()">&#9660;</span>
          </button>

          @if (menuOpen()) {
            <div class="dropdown">
              <div class="dropdown-header">
                <span class="dropdown-name">{{ user.fullName }}</span>
                <span class="dropdown-role">{{ user.role }} &middot; {{ user.department }}</span>
              </div>
              <hr class="dropdown-divider" />
              <button class="dropdown-item logout" (click)="logout()">
                Sign out
              </button>
            </div>
          }
        </div>
      }

      <!-- Hamburger (mobile) -->
      <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>
